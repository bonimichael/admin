<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ADMIN PANEL</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
}

.box{
  width:90%;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}

button{
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.match{
  background:#334155;
  padding:10px;
  margin:10px;
  border-radius:8px;
}

.actions button{
  width:48%;
  margin:5px 1%;
}

.delete{
  background:#ef4444;
}
</style>
</head>

<body>

<h2>ADMIN PANEL</h2>

<div class="box">

<input type="date" id="date">
<input type="text" id="match" placeholder="Arsenal vs Chelsea">
<input type="text" id="tip" placeholder="Over 2.5">
<input type="text" id="odd" placeholder="1.85">
<input type="text" id="ft" placeholder="2-1 or ???">

<select id="type">
  <option value="vip">💎 VIP</option>
  <option value="free">🆓 FREE</option>
</select>

<button onclick="saveMatch()">SAVE / UPDATE</button>

<p id="msg"></p>

</div>

<h3>ALL MATCHES</h3>
<div id="list"></div>

<h3>VIP CODES</h3>

<div class="box">
  <input type="text" id="vipCode" placeholder="Enter VIP Code (e.g VIP123)">
  <input type="date" id="vipExpiry">

  <button onclick="addVip()">ADD VIP CODE</button>

  <p id="vipMsg"></p>
</div>

<div id="vipList"></div>

<h3>HISTORY (ADMIN)</h3>

<div class="box">
  <button onclick="loadHistory()">LOAD HISTORY</button>
</div>

<div id="historyList"></div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import { 
  getFirestore, 
  collection, 
  addDoc,
  getDocs,
  doc,
  updateDoc,
  deleteDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

// ✅ FIXED FIREBASE CONFIG (HAKUNA MABADILIKO YA LOGIC)
const firebaseConfig = {
  apiKey: "AIzaSyDbfaPPAFdOSJm09OxQeMqQ-UsLkQzsdxk",
  authDomain: "vip-app-b82d3.firebaseapp.com",
  projectId: "vip-app-b82d3",
  storageBucket: "vip-app-b82d3.firebasestorage.app",
  messagingSenderId: "412845975498",
  appId: "1:412845975498:web:e577440f7ae87de7b4d133",
  measurementId: "G-FH94KTWY8L"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let editId = null;

// FICHA PAGE
document.body.style.display = "none";

// LOGIN
async function login(){
  const email = prompt("Admin Email:");
  const password = prompt("Password:");

  try{
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    console.log("LOGGED IN:", userCred.user.email);
  }catch(e){
    alert(e.message);
    location.reload();
  }
}

// CHECK LOGIN + ADMIN VERIFY
onAuthStateChanged(auth, user => {

  if(user){

    console.log("CURRENT USER:", user.email);

    if(user.email !== "boniphacemaiko46@gmail.com"){
      alert("Wewe sio admin!");
      signOut(auth);
      return;
    }

    document.body.style.display = "block";
    loadMatches();
    loadVipCodes();
    loadHistory();

  }else{
    login();
  }

});

// SAVE MATCH
window.saveMatch = async function(){

let rawDate = document.getElementById("date").value;

let d = new Date(rawDate);
let date = String(d.getDate()).padStart(2,'0') + "." +
           String(d.getMonth()+1).padStart(2,'0') + "." +
           d.getFullYear();

const match = document.getElementById("match").value.trim();
const tip = document.getElementById("tip").value.trim();
const odd = document.getElementById("odd").value.trim();
const ft = document.getElementById("ft").value.trim();
const type = document.getElementById("type").value;

const msg = document.getElementById("msg");

if(!rawDate || !match || !tip || !odd || !ft){
  msg.innerText = "Jaza kila kitu!";
  return;
}

if(isNaN(odd) || Number(odd) <= 1){
  msg.innerText = "Odd sio sahihi!";
  return;
}

try{

if(editId){
  await updateDoc(doc(db,"matches",editId),{
    date, match, tip, odd, ft, type
  });
  msg.innerText = "✔ Updated!";
  editId = null;
}else{
  await addDoc(collection(db,"matches"),{
    date, match, tip, odd, ft, type
  });
  msg.innerText = "✔ Saved!";
}

clearInputs();
loadMatches();
loadHistory();

}catch(e){
  msg.innerText = "Error: " + e.message;
  console.log(e);
}

};

// LOAD MATCHES
async function loadMatches(){

const list = document.getElementById("list");
list.innerHTML = "";

const snapshot = await getDocs(collection(db,"matches"));

snapshot.forEach(docSnap => {

const d = docSnap.data();

const div = document.createElement("div");
div.className = "match";

const title = document.createElement("p");
title.innerHTML = "<b></b>";
title.querySelector("b").textContent = d.match;

const info = document.createElement("p");
info.textContent = `${d.date} | ${d.tip} | ${d.odd} | FT: ${d.ft} | ${d.type || "vip"}`;

const actions = document.createElement("div");
actions.className = "actions";

const editBtn = document.createElement("button");
editBtn.textContent = "EDIT";
editBtn.onclick = () => editMatch(docSnap.id);

const delBtn = document.createElement("button");
delBtn.textContent = "DELETE";
delBtn.className = "delete";
delBtn.onclick = () => deleteMatch(docSnap.id);

actions.appendChild(editBtn);
actions.appendChild(delBtn);

div.appendChild(title);
div.appendChild(info);
div.appendChild(actions);

list.appendChild(div);

});

}

// LOAD HISTORY
async function loadHistory(){

const list = document.getElementById("historyList");
list.innerHTML = "";

const today = new Date();
const todayStr = String(today.getDate()).padStart(2,'0') + "." +
                 String(today.getMonth()+1).padStart(2,'0') + "." +
                 today.getFullYear();

const snapshot = await getDocs(collection(db,"matches"));

let matches = [];

snapshot.forEach(docSnap => {
  const d = docSnap.data();
  if(d.date === todayStr) return;

  matches.push({
    id: docSnap.id,
    ...d
  });
});

matches.sort((a,b)=>{
  const [da,ma,ya] = a.date.split(".");
  const [db,mb,yb] = b.date.split(".");
  const dateA = new Date(`${ya}-${ma}-${da}`);
  const dateB = new Date(`${yb}-${mb}-${db}`);
  return dateB - dateA;
});

matches.forEach(d => {

const div = document.createElement("div");
div.className = "match";

const title = document.createElement("p");
title.innerHTML = "<b></b>";
title.querySelector("b").textContent = d.match;

const info = document.createElement("p");
info.textContent = `${d.date} | ${d.tip} | ${d.odd} | FT: ${d.ft} | ${d.type || "vip"}`;

const actions = document.createElement("div");
actions.className = "actions";

const editBtn = document.createElement("button");
editBtn.textContent = "EDIT";
editBtn.onclick = () => editMatch(d.id);

const delBtn = document.createElement("button");
delBtn.textContent = "DELETE";
delBtn.className = "delete";
delBtn.onclick = () => deleteMatch(d.id);

actions.appendChild(editBtn);
actions.appendChild(delBtn);

div.appendChild(title);
div.appendChild(info);
div.appendChild(actions);

list.appendChild(div);

});

}

// ADD VIP
window.addVip = async function(){

const code = document.getElementById("vipCode").value.trim();
const expiry = document.getElementById("vipExpiry").value;
const msg = document.getElementById("vipMsg");

if(!code){
  msg.innerText = "Weka code!";
  return;
}

try{
  await addDoc(collection(db,"vip_codes"),{
    code: code,
    active: true,
    expiry: expiry || null
  });

  msg.innerText = "✔ VIP Added!";
  document.getElementById("vipCode").value="";
  document.getElementById("vipExpiry").value="";

  loadVipCodes();

}catch(e){
  msg.innerText = "Error: " + e.message;
  console.log(e);
}

};

// LOAD VIP
async function loadVipCodes(){

const vipList = document.getElementById("vipList");
vipList.innerHTML = "";

const snapshot = await getDocs(collection(db,"vip_codes"));

snapshot.forEach(docSnap => {

const d = docSnap.data();

const div = document.createElement("div");
div.className = "match";

const info = document.createElement("p");
info.textContent = `Code: ${d.code} | Expiry: ${d.expiry || "No Expiry"} | Active: ${d.active}`;

const delBtn = document.createElement("button");
delBtn.textContent = "DELETE";
delBtn.className = "delete";
delBtn.onclick = () => deleteVip(docSnap.id);

div.appendChild(info);
div.appendChild(delBtn);

vipList.appendChild(div);

});

}

// DELETE VIP
window.deleteVip = async function(id){
if(confirm("Delete this VIP code?")){
  await deleteDoc(doc(db,"vip_codes",id));
  loadVipCodes();
}
};

// EDIT
window.editMatch = async function(id){

const snap = await getDoc(doc(db,"matches",id));

if(snap.exists()){
  const data = snap.data();

  document.getElementById("date").value = "";
  document.getElementById("match").value = data.match;
  document.getElementById("tip").value = data.tip;
  document.getElementById("odd").value = data.odd;
  document.getElementById("ft").value = data.ft;
  document.getElementById("type").value = data.type || "vip";

  editId = id;
}

};

// DELETE
window.deleteMatch = async function(id){

const msg = document.getElementById("msg");

if(confirm("Delete this match?")){
  await deleteDoc(doc(db,"matches",id));
  msg.innerText = "🗑️ Deleted!";
  loadMatches();
  loadHistory();
}

};

// CLEAR
function clearInputs(){
document.getElementById("date").value="";
document.getElementById("match").value="";
document.getElementById("tip").value="";
document.getElementById("odd").value="";
document.getElementById("ft").value="";
document.getElementById("type").value="vip";
}

</script>

</body>
</html>
